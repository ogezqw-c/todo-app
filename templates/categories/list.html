{% extends "base.html" %}

{% block title %}分类管理 — TaskFlow{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>🏷️ 分类管理</h1>
    <a href="{{ url_for('main.category_new') }}" class="btn btn-gradient">
        <i class="bi bi-plus-lg"></i> 新建分类
    </a>
</div>

{% if categories %}
<div class="glass-card animate-in">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th style="width:60px;">颜色</th>
                        <th>名称</th>
                        <th>任务数</th>
                        <th class="text-end" style="width:160px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>
                            <span class="color-swatch" style="background-color: {{ cat.color }};"></span>
                        </td>
                        <td>
                            <span class="badge" style="background: {{ cat.color }}30; color: {{ cat.color }}; border:1px solid {{ cat.color }}40; font-size:0.85rem;">
                                {{ cat.name }}
                            </span>
                        </td>
                        <td>
                            <span class="fw-bold" style="color: var(--text-secondary);">{{ cat.task_count }}</span>
                        </td>
                        <td class="text-end">
                            <a href="{{ url_for('main.category_edit', id=cat.id) }}" class="btn btn-sm btn-outline" title="编辑">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form action="{{ url_for('main.category_delete', id=cat.id) }}" method="POST" class="d-inline delete-form">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        {% if cat.task_count > 0 %}disabled title="请先移除该分类下的所有任务"{% endif %}>
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% else %}
<div class="glass-card animate-in">
    <div class="card-body empty-state">
        <i class="bi bi-tags"></i>
        <p style="color:var(--text-muted); font-size:1.1rem;">暂无分类，创建一个吧！</p>
        <a href="{{ url_for('main.category_new') }}" class="btn btn-gradient mt-2">
            <i class="bi bi-plus-lg me-1"></i> 新建分类
        </a>
    </div>
</div>
{% endif %}
{% endblock %}
