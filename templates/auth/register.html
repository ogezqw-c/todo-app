<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width:480px;margin-top:6vh;">
        <div class="text-center mb-4">
            <h1 style="background:none;-webkit-text-fill-color:transparent;background-clip:text;
                       background-image:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));font-size:2rem;">
                <i class="bi bi-check2-square"></i> TaskFlow
            </h1>
            <p style="color:var(--text-secondary);">创建你的专属任务空间</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="glass-card">
            <div class="card-body">
                <form method="POST" novalidate>
                    <!-- 用户名 -->
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            用户名 <span style="color:var(--danger);">*</span>
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus
                               placeholder="2-50 个字符，支持字母、数字、下划线" minlength="2" maxlength="50"
                               pattern="[a-zA-Z0-9_一-龥]+">
                        <div class="form-text">
                            <i class="bi bi-info-circle"></i> 支持中英文、数字和下划线，不含特殊符号
                        </div>
                    </div>

                    <!-- 邮箱 -->
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            邮箱 <span style="color:var(--danger);">*</span>
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="example@qq.com">
                        <div class="form-text">
                            <i class="bi bi-envelope"></i> 用于接收逾期提醒邮件，请填写真实邮箱
                        </div>
                    </div>

                    <!-- 密码 -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            密码 <span style="color:var(--danger);">*</span>
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required
                               placeholder="至少 6 位" minlength="6">
                        <div class="form-text">
                            <i class="bi bi-shield-lock"></i> 至少 6 个字符，建议包含字母和数字
                        </div>
                    </div>

                    <!-- 确认密码 -->
                    <div class="mb-4">
                        <label for="password2" class="form-label">
                            确认密码 <span style="color:var(--danger);">*</span>
                        </label>
                        <input type="password" class="form-control" id="password2" name="password2" required
                               placeholder="再次输入密码">
                        <div class="invalid-feedback d-block" id="pwdMismatch" style="display:none !important;">
                            两次输入的密码不一致
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gradient w-100 mb-3">
                        <i class="bi bi-person-plus me-1"></i> 创建账户
                    </button>
                    <div class="text-center">
                        <span style="color:var(--text-muted);">已有账户？</span>
                        <a href="{{ url_for('main.login') }}">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 前端密码一致性校验
    document.querySelector('form').addEventListener('submit', function(e) {
        var p1 = document.getElementById('password').value;
        var p2 = document.getElementById('password2').value;
        if (p1 !== p2) {
            e.preventDefault();
            alert('两次输入的密码不一致，请重新输入。');
        }
    });
    </script>
</body>
</html>
