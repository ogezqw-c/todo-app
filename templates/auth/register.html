<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width:460px;margin-top:8vh;">
        <div class="text-center mb-4">
            <h1 style="background:none;-webkit-text-fill-color:transparent;background-clip:text;
                       background-image:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));font-size:2rem;">
                <i class="bi bi-check2-square"></i> TaskFlow
            </h1>
            <p style="color:var(--text-secondary);">创建新账户</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="glass-card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 <span style="color:var(--danger);">*</span></label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus
                               placeholder="至少 2 个字符" minlength="2" maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱 <span style="color:var(--danger);">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="用于接收通知">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码 <span style="color:var(--danger);">*</span></label>
                        <input type="password" class="form-control" id="password" name="password" required
                               placeholder="至少 6 个字符" minlength="6">
                    </div>
                    <div class="mb-4">
                        <label for="password2" class="form-label">确认密码 <span style="color:var(--danger);">*</span></label>
                        <input type="password" class="form-control" id="password2" name="password2" required
                               placeholder="再次输入密码">
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 mb-3">
                        <i class="bi bi-person-plus me-1"></i> 注册
                    </button>
                    <div class="text-center">
                        <span style="color:var(--text-muted);">已有账户？</span>
                        <a href="{{ url_for('main.login') }}">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
